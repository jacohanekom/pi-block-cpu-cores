name: Build

on:
  push:
  pull_request:

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential debhelper devscripts

      - name: Build package
        run: dpkg-buildpackage -us -uc -b

      - name: Collect build artifacts
        run: |
          mkdir dist
          cp ../*.deb ../*.changes ../*.buildinfo dist/

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-block-cpu-cores-deb
          path: dist/*
